openapi: 3.1.0
info:
  title: Panels API
  version: 1.0.0
servers:
  - url: https://api.example.test
paths:
  /panels:
    get:
      operationId: listPanels
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Panel"
    post:
      operationId: createPanel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PanelCreate"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Panel"
  /panels/{id}:
    get:
      operationId: getPanel
      responses:
        "200":
          description: ok
components:
  schemas:
    Panel:
      type: object
      properties:
        parent:
          $ref: "#/components/schemas/Panel"
    PanelCreate:
      type: object
