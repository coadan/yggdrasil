schema {
  query: Query
  mutation: Mutation
}

type Query {
  panel(id: ID!): Panel
}

type Mutation {
  createPanel(input: PanelInput!): Panel
}

type Panel implements Node {
  id: ID!
  title: String!
  owner: User
}

interface Node {
  id: ID!
}

input PanelInput {
  title: String!
}

fragment PanelSummary on Panel {
  id
  title
}
