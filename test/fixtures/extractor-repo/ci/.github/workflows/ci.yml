name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DB: panels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
      - run: bb test
        working-directory: apps/web
  deploy:
    needs: test
    runs-on: ubuntu-latest
    container: ghcr.io/acme/deploy:latest
    steps:
      - uses: actions/upload-artifact@v4
      - run: bb deploy
