include:
  - local: ci/common.yml
  - template: Security/SAST.gitlab-ci.yml

stages: [test, deploy]

test:
  stage: test
  image: clojure:tools-deps
  cache:
    paths:
      - .m2/repository
  variables:
    TEST_DB: panels
  script: bb test

deploy:
  stage: deploy
  needs: [test]
  artifacts:
    paths:
      - target/report
  script: bb deploy
