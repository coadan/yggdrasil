name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@f556541eb28a9303896cee0679ba9f60b898300f # 13.5
        with:
          cli: latest
          bb: latest
      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep
      - run: bb test
      - run: bb lint
      - run: bb format:check

  report-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: report-ui
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: report-ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ygg:test
      - name: Smoke CLI lifecycle
        run: |
          docker run --rm ygg:test sh -c '
            repo=$(mktemp -d)
            git -C "$repo" init -q
            ygg init "$repo" --project docker-smoke --sync --no-input
            ygg query "docker smoke" --project docker-smoke --json --no-progress >/dev/null
            ygg status --json
            test -f /data/config/projects.edn
            test -d /data/projects/docker-smoke/xtdb
            ygg stop
          '
